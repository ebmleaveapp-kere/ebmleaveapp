<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Danu HR Leave System</title>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<style>
/* ================= BASE UI ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    color: #0f172a;
}

/* AUTH SCREEN */
.auth {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
    width: 320px;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 15px;
    margin-top: 10px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1e40af;
}

/* APP */
.hidden { display: none; }

header {
    background: white;
    padding: 15px;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
}

.container {
    padding: 20px;
}

.panel {
    background: white;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 15px;
}

#debug {
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: black;
    color: lime;
    font-size: 12px;
    padding: 8px;
    max-width: 90%;
}
</style>
</head>

<body>

<div id="debug">Loading system...</div>

<!-- AUTH -->
<div id="authScreen" class="auth">
    <div class="card">
        <h2>Danu HR System</h2>
        <p>Sign in to continue</p>
        <button id="loginBtn">Sign in with Google</button>
    </div>
</div>

<!-- APP -->
<div id="appScreen" class="hidden">

<header>
    <h3>HR Dashboard</h3>
    <button id="logoutBtn">Logout</button>
</header>

<div class="container">

    <div class="panel">
        <h3>Google Sheets Connection</h3>
        <button onclick="testConnection()">Test Connection</button>
        <p id="status"></p>
    </div>

</div>

</div>

<script>
/* ================= CONFIG (YOUR WORKING DATA) ================= */
const CONFIG = {
    CLIENT_ID: "1058574831034-cb30fi18f3f05937969jksvhipso5hav.apps.googleusercontent.com",
    API_KEY: "AIzaSyD4oMaBJeXQy8JCpzqcOAJ9HexNAKCPlyY",
    SHEET_ID: "1NnOJFFLbPtuPYbI53dXIKA_KezdnxhCiqsPteuvL1Fc",
    SCOPES: "https://www.googleapis.com/auth/spreadsheets"
};

let tokenClient;
let accessToken = null;

/* ================= DEBUG ================= */
function log(msg){
    document.getElementById("debug").innerText = msg;
}

/* ================= INIT ================= */
window.onload = async () => {
    log("Initializing...");

    await gapi.load("client", async () => {
        await gapi.client.init({
            apiKey: CONFIG.API_KEY,
            discoveryDocs: ["https://sheets.googleapis.com/$discovery/rest?version=v4"]
        });

        log("Google API Ready ✔");
        initAuth();
    });
};

/* ================= AUTH ================= */
function initAuth() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: CONFIG.SCOPES,
        callback: (resp) => {
            accessToken = resp.access_token;

            gapi.client.setToken({
                access_token: accessToken
            });

            showApp();
            log("Login success ✔");
        }
    });
}

/* ================= UI ================= */
function showApp(){
    document.getElementById("authScreen").classList.add("hidden");
    document.getElementById("appScreen").classList.remove("hidden");
}

function showAuth(){
    document.getElementById("authScreen").classList.remove("hidden");
    document.getElementById("appScreen").classList.add("hidden");
}

/* ================= BUTTONS ================= */
document.getElementById("loginBtn").onclick = () => {
    tokenClient.requestAccessToken({ prompt: "consent" });
};

document.getElementById("logoutBtn").onclick = () => {
    gapi.client.setToken(null);
    accessToken = null;
    showAuth();
    log("Logged out");
};

/* ================= TEST SHEET ================= */
async function testConnection(){
    try {
        const res = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: CONFIG.SHEET_ID,
            range: "Employees!A:D"
        });

        console.log(res.result.values);

        document.getElementById("status").innerText =
            "Google Sheets Connected ✔";

        log("Sheets OK ✔");

    } catch(err){
        document.getElementById("status").innerText =
            "Connection failed ❌";

        log("ERROR: " + err.message);
    }
}
</script>

</body>
</html>
