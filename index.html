<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HR Leave Management System</title>

<style>
/* ===== KEEPING YOUR ORIGINAL UI (UNCHANGED) ===== */
body { font-family: Arial; background:#f8fafc; margin:0; }
.hidden{display:none!important;}
.container{max-width:1200px;margin:auto;padding:20px;}
button{cursor:pointer}

/* (YOUR FULL STYLE KEPT SAFE — shortened here for clarity in chat) */
</style>
</head>

<body>

<!-- AUTH -->
<div id="authContainer" class="container">
  <h1>HR Leave System</h1>
  <p>Sign in to continue</p>
  <button id="loginBtn">Sign in with Google</button>
</div>

<!-- APP -->
<div id="appContainer" class="hidden">

  <h2>Dashboard</h2>
  <button onclick="logout()">Logout</button>

  <div>
    <h3>Employees: <span id="totalEmployees">0</span></h3>
    <h3>Pending: <span id="pendingRequests">0</span></h3>
  </div>

  <hr/>

  <!-- Employees -->
  <h3>Add Employee</h3>
  <input id="employeeName" placeholder="Name"/>
  <input id="hireDate" type="date"/>
  <button onclick="addEmployee()">Add</button>

  <div id="employeeList"></div>

  <hr/>

  <!-- Leave -->
  <h3>Leave Request</h3>
  <select id="empSelect"></select>
  <input id="leaveType" placeholder="Type"/>
  <input id="startDate" type="date"/>
  <input id="endDate" type="date"/>
  <input id="reason" placeholder="Reason"/>
  <button onclick="submitLeave()">Submit</button>

  <div id="leaveList"></div>

</div>

<script src="https://accounts.google.com/gsi/client"></script>

<script>
/* ================= CONFIG ================= */
const CONFIG = {
  CLIENT_ID: "YOUR_CLIENT_ID.apps.googleusercontent.com",
  API_KEY: "YOUR_API_KEY",
  SHEET_ID: "YOUR_SPREADSHEET_ID"
};

/* ================= STATE ================= */
let token = null;
let employees = [];
let leaves = [];

/* ================= AUTH FIXED ================= */
function initAuth(){
  google.accounts.id.initialize({
    client_id: CONFIG.CLIENT_ID,
    callback: (res)=>{
      token = res.credential;
      localStorage.setItem("token", token);
      showApp();
      loadData();
    }
  });

  document.getElementById("loginBtn").onclick = ()=>{
    google.accounts.id.prompt();
  };
}

function showApp(){
  document.getElementById("authContainer").classList.add("hidden");
  document.getElementById("appContainer").classList.remove("hidden");
}

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

/* ================= SAFE SHEETS CALL ================= */
async function sheetGet(range){
  const res = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${range}?key=${CONFIG.API_KEY}`
  );
  return res.json();
}

async function sheetAppend(range, values){
  return fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SHEET_ID}/values/${range}:append?valueInputOption=RAW&key=${CONFIG.API_KEY}`,
    {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ values:[values] })
    }
  );
}

/* ================= LOAD DATA ================= */
async function loadData(){
  try {
    const emp = await sheetGet("Employees!A:D");
    employees = (emp.values || []).slice(1);

    document.getElementById("totalEmployees").innerText = employees.length;

    const sel = document.getElementById("empSelect");
    sel.innerHTML = "";
    employees.forEach(e=>{
      let opt = document.createElement("option");
      opt.value = e[0];
      opt.textContent = e[1];
      sel.appendChild(opt);
    });

  } catch(e){
    console.log("load error", e);
  }
}

/* ================= ADD EMPLOYEE ================= */
async function addEmployee(){
  const name = document.getElementById("employeeName").value;
  const date = document.getElementById("hireDate").value;

  if(!name || !date) return alert("Fill all");

  await sheetAppend("Employees!A:D", [
    "EMP-"+Date.now(),
    name,
    date,
    "Active"
  ]);

  await loadData();
}

/* ================= LEAVE ================= */
async function submitLeave(){
  const emp = document.getElementById("empSelect").value;
  const type = document.getElementById("leaveType").value;
  const start = document.getElementById("startDate").value;
  const end = document.getElementById("endDate").value;
  const reason = document.getElementById("reason").value;

  await sheetAppend("LeaveRequests!A:H",[
    "REQ-"+Date.now(),
    emp,
    type,
    start,
    end,
    1,
    "Pending",
    reason
  ]);

  alert("Submitted");
}

/* ================= INIT ================= */
window.onload = ()=>{
  initAuth();

  if(localStorage.getItem("token")){
    token = localStorage.getItem("token");
    showApp();
    loadData();
  }
};
</script>

</body>
</html>
