<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HR Leave System</title>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<style>
/* KEEP SIMPLE (your full UI can be pasted back later safely) */
body { font-family: Arial; background:#f8fafc; }
.hidden { display:none; }
#debug { color:red; font-weight:bold; padding:10px; }
</style>
</head>

<body>

<div id="debug"></div>

<!-- AUTH -->
<div id="authContainer">
    <h2>HR System Login</h2>
    <button id="loginBtn">Sign in with Google</button>
</div>

<!-- APP -->
<div id="appContainer" class="hidden">
    <h2>HR Dashboard</h2>
    <button id="logoutBtn">Logout</button>

    <button onclick="loadAllData()">Load Data</button>
</div>

<script>
/* ================= YOUR CONFIG ================= */
const CONFIG = {
    CLIENT_ID: "1058574831034-cb30fi18f3f05937969jksvhipso5hav.apps.googleusercontent.com",
    API_KEY: "AIzaSyD4oMaBJeXQy8JCpzqcOAJ9HexNAKCPlyY",
    SCOPES: "https://www.googleapis.com/auth/spreadsheets",
    SPREADSHEET_ID: "1NnOJFFLbPtuPYbI53dXIKA_KezdnxhCiqsPteuvL1Fc"
};

let tokenClient;
let accessToken = null;

/* ================= GLOBAL ERROR CATCH ================= */
window.onerror = function(msg, src, line) {
    document.getElementById("debug").innerText =
        "ERROR: " + msg + " (line " + line + ")";
};

/* ================= START ================= */
document.addEventListener("DOMContentLoaded", () => {
    showAuth();
    waitForGoogle();
    setupButtons();
});

/* ================= WAIT FOR GOOGLE ================= */
function waitForGoogle() {
    let i = 0;

    const check = () => {
        i++;

        if (window.gapi && window.google) {
            initGapi();
        } else if (i < 40) {
            setTimeout(check, 250);
        } else {
            showError("Google scripts failed to load");
        }
    };

    check();
}

/* ================= INIT GAPI ================= */
function initGapi() {
    gapi.load("client", async () => {
        try {
            await gapi.client.init({
                apiKey: CONFIG.API_KEY,
                discoveryDocs: [
                    "https://sheets.googleapis.com/$discovery/rest?version=v4"
                ]
            });

            initAuth();

        } catch (e) {
            showError("GAPI init failed: " + e.message);
        }
    });
}

/* ================= AUTH ================= */
function initAuth() {
    try {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CONFIG.CLIENT_ID,
            scope: CONFIG.SCOPES,
            callback: (resp) => {
                accessToken = resp.access_token;

                gapi.client.setToken({
                    access_token: accessToken
                });

                showApp();
                loadAllData();
            }
        });
    } catch (e) {
        showError("Auth error: " + e.message);
    }
}

/* ================= UI ================= */
function showApp() {
    document.getElementById("authContainer").classList.add("hidden");
    document.getElementById("appContainer").classList.remove("hidden");
}

function showAuth() {
    document.getElementById("authContainer").classList.remove("hidden");
    document.getElementById("appContainer").classList.add("hidden");
}

function showError(msg) {
    document.getElementById("debug").innerText = msg;
}

/* ================= BUTTONS ================= */
function setupButtons() {
    document.getElementById("loginBtn").onclick = () => {
        if (!tokenClient) {
            showError("Google not ready");
            return;
        }
        tokenClient.requestAccessToken({ prompt: "consent" });
    };

    document.getElementById("logoutBtn").onclick = () => {
        accessToken = null;
        gapi.client.setToken(null);
        showAuth();
    };
}

/* ================= TEST SHEET CONNECTION ================= */
async function loadAllData() {
    try {
        const res = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: CONFIG.SPREADSHEET_ID,
            range: "Employees!A:D"
        });

        console.log("DATA:", res.result.values);

        document.getElementById("debug").innerText =
            "SUCCESS: Google Sheets connected ✔";

    } catch (e) {
        showError("Sheets error: " + e.message);
    }
}
</script>

</body>
</html>
