<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>
const CONFIG = {
    CLIENT_ID: 'YOUR_CLIENT_ID',
    API_KEY: 'YOUR_API_KEY',
    SCOPES: 'https://www.googleapis.com/auth/spreadsheets',
    SPREADSHEET_ID: 'YOUR_SHEET_ID',
    SHEET_NAMES: {
        EMPLOYEES: 'Employees',
        LEAVE_BALANCE: 'LeaveBalance',
        LEAVE_REQUESTS: 'LeaveRequests',
        ACTIVITY_LOGS: 'ActivityLogs'
    }
};

let accessToken = null;
let tokenClient;

let allEmployees = [];
let allLeaveRequests = [];
let allLeaveBalance = [];
let allActivityLogs = [];

/* ================= INIT GOOGLE ================= */
function initializeGoogle() {
    gapi.load('client', async () => {
        await gapi.client.init({
            apiKey: CONFIG.API_KEY,
            discoveryDocs: [
                "https://sheets.googleapis.com/$discovery/rest?version=v4"
            ]
        });

        setupAuth();
    });
}

/* ================= AUTH (FIXED) ================= */
function setupAuth() {

    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: CONFIG.SCOPES,
        callback: async (tokenResponse) => {

            accessToken = tokenResponse.access_token;

            gapi.client.setToken({
                access_token: accessToken
            });

            showApp();
            await loadAllData();
        }
    });

    document.getElementById('loginBtn').onclick = () => {
        tokenClient.requestAccessToken({ prompt: 'consent' });
    };

    document.getElementById('logoutBtn').onclick = logout;
}

/* ================= UI SWITCH ================= */
function showApp() {
    document.getElementById('authContainer').classList.add('hidden');
    document.getElementById('appContainer').classList.remove('hidden');
}

function showAuth() {
    document.getElementById('authContainer').classList.remove('hidden');
    document.getElementById('appContainer').classList.add('hidden');
}

/* ================= LOGOUT ================= */
function logout() {
    accessToken = null;
    gapi.client.setToken(null);
    showAuth();
}

/* ================= LOAD DATA ================= */
async function loadAllData() {
    await loadEmployees();
    await loadLeaveRequests();
    await loadLeaveBalance();
    await loadActivityLogs();

    updateDashboard();
    updateAllDisplays();
}

/* ================= SHEETS ================= */
async function loadEmployees() {
    const res = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: CONFIG.SPREADSHEET_ID,
        range: CONFIG.SHEET_NAMES.EMPLOYEES + "!A:D"
    });

    const rows = res.result.values || [];

    allEmployees = rows.slice(1).map(r => ({
        id: r[0],
        name: r[1],
        hireDate: r[2],
        status: r[3]
    }));
}

async function loadLeaveRequests() {
    const res = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: CONFIG.SPREADSHEET_ID,
        range: CONFIG.SHEET_NAMES.LEAVE_REQUESTS + "!A:H"
    });

    const rows = res.result.values || [];

    allLeaveRequests = rows.slice(1).map(r => ({
        id: r[0],
        employeeId: r[1],
        type: r[2],
        startDate: r[3],
        endDate: r[4],
        days: r[5],
        status: r[6],
        reason: r[7]
    }));
}

async function loadLeaveBalance() {
    const res = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: CONFIG.SPREADSHEET_ID,
        range: CONFIG.SHEET_NAMES.LEAVE_BALANCE + "!A:E"
    });

    const rows = res.result.values || [];

    allLeaveBalance = rows.slice(1).map(r => ({
        employeeId: r[0],
        total: r[1],
        used: r[2],
        remaining: r[3]
    }));
}

async function loadActivityLogs() {
    const res = await gapi.client.sheets.spreadsheets.values.get({
        spreadsheetId: CONFIG.SPREADSHEET_ID,
        range: CONFIG.SHEET_NAMES.ACTIVITY_LOGS + "!A:D"
    });

    const rows = res.result.values || [];

    allActivityLogs = rows.slice(1).map(r => ({
        time: r[0],
        action: r[1],
        details: r[2],
        user: r[3]
    }));
}

/* ================= START ================= */
document.addEventListener('DOMContentLoaded', () => {
    initializeGoogle();
});
</script>
