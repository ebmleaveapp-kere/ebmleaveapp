<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HR Leave Management System</title>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<style>
/* ===== UI (SAFE ORIGINAL STYLE CLEANED) ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background: #f8fafc;
    color: #1e293b;
}

.hidden { display: none !important; }

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

header {
    background: white;
    padding: 15px;
    border-bottom: 1px solid #e2e8f0;
    margin-bottom: 20px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.btn {
    background: #2563eb;
    color: white;
}

.btn:hover {
    background: #1e40af;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 15px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

#debug {
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: #111;
    color: #0f0;
    padding: 10px;
    font-size: 12px;
    max-width: 90%;
}
</style>
</head>

<body>

<div id="debug">Booting system...</div>

<!-- AUTH -->
<div id="authContainer" class="container">
    <h2>HR Leave System</h2>
    <p>Sign in to continue</p>
    <button id="loginBtn" class="btn">Sign in with Google</button>
</div>

<!-- APP -->
<div id="appContainer" class="hidden">

<header>
    <h2>HR Dashboard</h2>
    <button id="logoutBtn" class="btn">Logout</button>
</header>

<div class="container">

    <div class="card">
        <h3>System Status</h3>
        <button onclick="loadAllData()" class="btn">Test Google Sheets Connection</button>
        <p id="statusText"></p>
    </div>

</div>
</div>

<script>
/* ================= CONFIG (YOUR WORKING DATA) ================= */
const CONFIG = {
    CLIENT_ID: "1058574831034-cb30fi18f3f05937969jksvhipso5hav.apps.googleusercontent.com",
    API_KEY: "AIzaSyD4oMaBJeXQy8JCpzqcOAJ9HexNAKCPlyY",
    SPREADSHEET_ID: "1NnOJFFLbPtuPYbI53dXIKA_KezdnxhCiqsPteuvL1Fc",
    SCOPES: "https://www.googleapis.com/auth/spreadsheets"
};

let tokenClient;
let accessToken = null;

/* ================= SAFE DEBUG ================= */
function debug(msg) {
    document.getElementById("debug").innerText = msg;
}

/* ================= BOOT ================= */
window.addEventListener("load", () => {
    debug("Loading Google APIs...");
    initGoogle();
});

/* ================= INIT GOOGLE ================= */
function initGoogle() {
    let tries = 0;

    const wait = setInterval(() => {
        tries++;

        if (window.google && window.gapi) {
            clearInterval(wait);
            initGapi();
        }

        if (tries > 40) {
            clearInterval(wait);
            debug("Google scripts failed to load");
        }
    }, 200);
}

/* ================= GAPI INIT ================= */
function initGapi() {
    gapi.load("client", async () => {
        try {
            await gapi.client.init({
                apiKey: CONFIG.API_KEY,
                discoveryDocs: [
                    "https://sheets.googleapis.com/$discovery/rest?version=v4"
                ]
            });

            initAuth();
            debug("Google API ready ✔");

        } catch (e) {
            debug("GAPI error: " + e.message);
        }
    });
}

/* ================= AUTH ================= */
function initAuth() {
    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CONFIG.CLIENT_ID,
        scope: CONFIG.SCOPES,
        callback: (resp) => {
            accessToken = resp.access_token;

            gapi.client.setToken({
                access_token: accessToken
            });

            showApp();
            debug("Login successful ✔");
        }
    });
}

/* ================= UI CONTROL ================= */
function showApp() {
    document.getElementById("authContainer").classList.add("hidden");
    document.getElementById("appContainer").classList.remove("hidden");
}

function showAuth() {
    document.getElementById("authContainer").classList.remove("hidden");
    document.getElementById("appContainer").classList.add("hidden");
}

/* ================= BUTTONS ================= */
document.getElementById("loginBtn").onclick = () => {
    if (!tokenClient) return debug("Auth not ready");
    tokenClient.requestAccessToken({ prompt: "consent" });
};

document.getElementById("logoutBtn").onclick = () => {
    accessToken = null;
    gapi.client.setToken(null);
    showAuth();
    debug("Logged out");
};

/* ================= SHEET TEST ================= */
async function loadAllData() {
    try {
        const res = await gapi.client.sheets.spreadsheets.values.get({
            spreadsheetId: CONFIG.SPREADSHEET_ID,
            range: "Employees!A:D"
        });

        console.log(res.result.values);

        document.getElementById("statusText").innerText =
            "✅ Google Sheets connected successfully";

        debug("Sheets OK ✔");

    } catch (e) {
        document.getElementById("statusText").innerText =
            "❌ Connection failed";

        debug("Sheet error: " + e.message);
    }
}
</script>

</body>
</html>
